{% set name = "modelbase" %}
{% set version = "1.59.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 503c8aeed94088f102b67674c73649652160955fe2724c7b30a1460bd3145c04

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - uv-build >=0.11,<0.12
  run:
    - assimulo >=3.5.2
    - black >=24.4
    - matplotlib-base >=3.9
    - numpy >=2.0,<2.4
    - pandas >=2.2
    - python >=3.9
    - python-libsbml >=5.20
    - scipy >=1.13
    - sympy >=1.12
    - tqdm >=4.66
    - ipywidgets >=8.1
    - typing-extensions >=4.12

test:
  imports:
    - modelbase
    - modelbase.core
    - modelbase.ode
    - modelbase.ode.models
    - modelbase.ode.simulators
    - modelbase.ode.utils
    - modelbase.utils

about:
  home: https://gitlab.com/qtb-hhu/modelbase-software
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: A package to build metabolic models
  doc_url: https://qtb-hhu.gitlab.io/modelbase-software/
  dev_url: https://gitlab.com/qtb-hhu/modelbase-software

extra:
  recipe-maintainers:
    - marvinvanaalst
    - ebenhoeh
